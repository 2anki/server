name: Playwright

on:
  push:
    paths:
      - 'web/src/App.tsx'
      - 'web/src/App.test.tsx'
      - 'web/src/index.tsx'
      - 'web/src/setupTests.ts'
      - 'web/src/components/**'
      - 'web/src/pages/**'
      - 'web/src/lib/**'
      - 'web/src/styles/**'
      - 'web/mock-server/**'
      - 'web/tests/**'
      - 'web/playwright.config.ts'
      - 'web/vite.config.*'
      - 'web/index.html'
      - 'web/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/playwright.yml'
      - '.github/actions/setup/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: playwright (22.20.0)
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter 2anki-web exec playwright install --with-deps chromium
      - name: Cache dist
        id: dist-cache
        uses: actions/cache@v5
        with:
          path: web/build
          key: dist-${{ runner.os }}-${{ hashFiles('web/src/**', 'web/public/**', 'web/index.html', 'web/vite.config.*', 'web/tsconfig*', 'pnpm-lock.yaml') }}
      - name: Build the application
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: pnpm --filter 2anki-web build
      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test
        env:
          PLAYWRIGHT_WITH_MOCK: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30
