name: Web

on:
  push:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
      - '.github/actions/setup/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (22.20.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Lint
        run: pnpm --filter 2anki-web lint
        env:
          CI: true

  build:
    name: build (22.20.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: pnpm --filter 2anki-web typecheck
        env:
          CI: true
      - name: Cache dist
        id: dist-cache
        uses: actions/cache@v5
        with:
          path: web/build
          key: dist-${{ runner.os }}-${{ hashFiles('web/src/**', 'web/public/**', 'web/index.html', 'web/vite.config.*', 'web/tsconfig*', 'pnpm-lock.yaml') }}
      - name: Build
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: pnpm --filter 2anki-web build
        env:
          CI: true

  test:
    name: test (22.20.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Test
        run: pnpm --filter 2anki-web test
        env:
          CI: true
