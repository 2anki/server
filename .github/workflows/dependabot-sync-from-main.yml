name: Sync dependabot-updates with main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dependabot-updates
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Merge main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "dependabot-updates already contains main; nothing to do."
            exit 0
          fi

          CLEAN_MERGE=true
          if ! git merge --no-edit origin/main; then
            CLEAN_MERGE=false
            # ours = dependabot-updates (checked out), theirs = origin/main
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            for f in $CONFLICTED; do
              case "$f" in
                pnpm-lock.yaml)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                package.json|web/package.json)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                *.yml|*.yaml)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                *)
                  echo "::error::Cannot auto-resolve conflict in $f"
                  exit 1
                  ;;
              esac
            done
          fi

          # GITHUB_TOKEN can't push workflow file changes — revert any
          # that came in from main (clean merge or conflict-resolved)
          WORKFLOW_CHANGES=$(git diff HEAD~1 --name-only -- .github/workflows/ || true)
          if [ -n "$WORKFLOW_CHANGES" ]; then
            echo "$WORKFLOW_CHANGES" | xargs git checkout HEAD~1 --
            git add .github/workflows/
          fi

          if [ "$CLEAN_MERGE" = false ]; then
            pnpm install --no-frozen-lockfile
            git add pnpm-lock.yaml
          fi

          # Amend the merge commit if anything was reverted or regenerated
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push origin dependabot-updates
