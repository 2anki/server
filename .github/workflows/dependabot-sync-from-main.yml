name: Sync dependabot-updates with main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dependabot-updates
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Merge main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "dependabot-updates already contains main; nothing to do."
            exit 0
          fi

          PRE_MERGE=$(git rev-parse HEAD)

          if ! git merge --no-edit origin/main; then
            # ours = dependabot-updates (checked out), theirs = origin/main
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            for f in $CONFLICTED; do
              case "$f" in
                pnpm-lock.yaml)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                package.json|web/package.json)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                *.yml|*.yaml)
                  git checkout --ours "$f"
                  git add "$f"
                  ;;
                *)
                  echo "::error::Cannot auto-resolve conflict in $f"
                  exit 1
                  ;;
              esac
            done
            pnpm install --no-frozen-lockfile
            git add pnpm-lock.yaml
            git commit --no-edit
          fi

          # GITHUB_TOKEN can't push workflow file changes. Revert any
          # workflow path the merge touched back to its pre-merge state:
          # restore if it existed, remove if main added it.
          WORKFLOW_CHANGES=$(git diff --name-only "$PRE_MERGE" HEAD -- .github/workflows/)
          for f in $WORKFLOW_CHANGES; do
            if git cat-file -e "$PRE_MERGE:$f" 2>/dev/null; then
              git checkout "$PRE_MERGE" -- "$f"
            else
              git rm -f "$f"
            fi
          done

          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push origin dependabot-updates
