name: Sync dependabot-updates with main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dependabot-updates
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Merge main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "dependabot-updates already contains main; nothing to do."
            exit 0
          fi

          if git merge --no-edit origin/main; then
            git push origin dependabot-updates
            exit 0
          fi

          # ours = dependabot-updates (checked out), theirs = origin/main
          CONFLICTED=$(git diff --name-only --diff-filter=U)
          for f in $CONFLICTED; do
            case "$f" in
              pnpm-lock.yaml)
                # Will be regenerated by pnpm install below
                git checkout --ours "$f"
                git add "$f"
                ;;
              package.json|web/package.json)
                # Keep dependabot's version bumps; main's non-dep
                # changes are rare and visible in the merge-back PR
                git checkout --ours "$f"
                git add "$f"
                ;;
              *.yml|*.yaml)
                git checkout --theirs "$f"
                git add "$f"
                ;;
              *)
                echo "::error::Cannot auto-resolve conflict in $f"
                exit 1
                ;;
            esac
          done

          pnpm install --no-frozen-lockfile
          git add pnpm-lock.yaml
          git commit --no-edit
          git push origin dependabot-updates
