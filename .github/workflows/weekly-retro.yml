name: Weekly retro draft

on:
  schedule:
    # Sundays 16:00 UTC (~18:00 Oslo summer / 17:00 winter)
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  draft-retro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute week metadata
        id: week
        run: |
          ISO_WEEK=$(date -u +%G-W%V)
          BRANCH="retro/${ISO_WEEK}"
          echo "iso_week=${ISO_WEEK}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Skip if PR already open
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --base main \
            --head "${{ steps.week.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR already open: #$existing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build retro draft
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/retros
          since=$(date -u -d '7 days ago' +%Y-%m-%d)

          merged_prs=$(gh pr list \
            --state merged \
            --base main \
            --search "merged:>=${since}" \
            --json number,title,url \
            --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' \
            || true)

          recent_issues=$(gh issue list \
            --state all \
            --search "updated:>=${since}" \
            --json number,title,url,state \
            --jq '.[] | "- [#\(.number)](\(.url)) \(.title) (\(.state))"' \
            || true)

          file="docs/retros/${{ steps.week.outputs.iso_week }}.md"
          {
            echo "# Weekly retro — ${{ steps.week.outputs.iso_week }}"
            echo ""
            echo "Auto-drafted $(date -u +%Y-%m-%dT%H:%MZ). Open in Claude Code and run \`/weekly-retro\` against this file, or fill it in by hand. Merge to archive."
            echo ""
            echo "## Numbers"
            echo ""
            echo "| Metric | This week | Last week | Δ |"
            echo "| --- | --- | --- | --- |"
            echo "| Signups | | | |"
            echo "| Conversion success rate | | | |"
            echo "| Active users | | | |"
            echo "| Churn | | | |"
            echo ""
            echo "## Trajectory"
            echo ""
            echo "Goal (CLAUDE.md): 300K users. Current: ___ . Required weekly growth to hit goal in 18 months: ___ . Gap: ___ ."
            echo ""
            echo "## Recent activity (auto)"
            echo ""
            echo "### Merged PRs (last 7 days)"
            echo ""
            if [ -z "$merged_prs" ]; then echo "_None._"; else echo "$merged_prs"; fi
            echo ""
            echo "### Issues opened/closed (last 7 days)"
            echo ""
            if [ -z "$recent_issues" ]; then echo "_None._"; else echo "$recent_issues"; fi
            echo ""
            echo "## Top 3 support themes"
            echo ""
            echo "1. "
            echo "2. "
            echo "3. "
            echo ""
            echo "## The single biggest gap this week"
            echo ""
            echo "_One sentence._"
            echo ""
            echo "## Priority shift for the next 7 days"
            echo ""
            echo "_One thing. Spec X / Ship Y / Pause Z._"
          } > "$file"

      - name: Commit and open draft PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.week.outputs.branch }}"
          git add docs/retros
          git commit -m "retro: draft for ${{ steps.week.outputs.iso_week }}"
          git push -u origin "${{ steps.week.outputs.branch }}"
          gh pr create \
            --draft \
            --base main \
            --head "${{ steps.week.outputs.branch }}" \
            --title "retro: ${{ steps.week.outputs.iso_week }}" \
            --body "Auto-drafted weekly retro. Fill in numbers + the single biggest gap, then merge to archive under \`docs/retros/\`."
