name: Lint

on:
  push:
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.20.0]

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: pnpm run lint
        run: |
          pnpm install
          pnpm run lint
        env:
          CI: true
