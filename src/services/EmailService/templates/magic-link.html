<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2anki.net - {{title}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #363636; line-height: 1.5; }
    .section { padding: 3rem 1.5rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    .has-text-grey-light { color: #b5b5b5; font-size: 0.875rem; }
    hr { border: none; border-top: 1px solid #dbdbdb; margin: 1.5rem 0; }
  </style>
</head>

<body class="content">
<section class="section">
  <div class="container">
    <h1 class="title">{{heading}}</h1>

    <p>{{description}}</p>

    <p style="text-indent: 1em;">
      <a href="{{link}}" style="display:inline-block;padding:12px 24px;background-color:#3273dc;color:#fff;text-decoration:none;border-radius:4px;font-weight:bold;">{{buttonText}}</a>
    </p>

    <p>This link expires in 15 minutes.</p>

    <p>Thanks,</p>

    <p>The 2anki.net Team</p>
    <hr />
    <p class="has-text-grey-light">
      Didn't request this? Ignore this message. No changes will be made to your account.
    </p>
  </div>
</section>
</body>
</html>
