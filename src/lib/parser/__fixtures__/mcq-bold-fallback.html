  <li>
    <details>
      <summary>Which vitamin deficiency causes rickets?</summary>
      <ul class="bulleted-list">
        <li style="list-style-type:disc">Vitamin A</li>
        <li style="list-style-type:disc"><strong>Vitamin D</strong></li>
        <li style="list-style-type:disc">Vitamin C</li>
        <li style="list-style-type:disc">Vitamin B12</li>
      </ul>
      <p>Vitamin D is essential for calcium absorption and bone mineralisation.</p>

  </li>
</ul>
</div>
</article>
