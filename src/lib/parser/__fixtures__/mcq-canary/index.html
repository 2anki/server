<body>
<article id="mcq-todo-article" class="page sans">
<header><h1 class="page-title">MCQ Fixture — To-do Checked</h1></header>
<div class="page-body">
<ul class="toggle">
  <li>
    <details>
      <summary>Which antibiotic targets the bacterial cell wall?</summary>
      <ul class="to-do-list">
        <li><span class="checkbox checkbox-off"></span>Azithromycin</li>
        <li><span class="checkbox checkbox-on"></span>Penicillin</li>
        <li><span class="checkbox checkbox-off"></span>Ciprofloxacin</li>
        <li><span class="checkbox checkbox-off"></span>Metronidazole</li>
      </ul>
      <p>Penicillin inhibits the final cross-linking step of peptidoglycan synthesis.</p>
    </details>
  </li>
</ul>
</div>
</article>
